services:
  - type: web
    name: sift
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: SIFT_MODEL_PROVIDER
        value: groq
      - key: SIFT_DATA_DIR
        value: /var/data/sift
      - key: SIFT_EXPERT_DATA_DIR
        value: /app/knowledge_base/expert
      - key: SIFT_SESSION_SECRET
        sync: false
      - key: SIFT_COOKIE_SECURE
        value: "true"
      - key: OLLAMA_BASE_URL
        value: http://127.0.0.1:11434
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL_SPEED
        value: openai/gpt-oss-20b
      - key: GROQ_MODEL_BALANCED
        value: openai/gpt-oss-120b
      - key: SIFT_ADMIN_TOKEN
        sync: false
      - key: SIFT_DATABASE_URL
        sync: false
      - key: SIFT_DATABASE_TOKEN
        sync: false

name: Sift CI

on:
  push:
    branches: ["main", "dev", "release/*"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install core dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python3 -m pytest --tb=short -q

  frontend-build:
    name: Frontend Build (Node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Build frontend
        run: npm --prefix frontend run build

  lint-check:
    name: Lint / Import Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install core dependencies
        run: pip install -r requirements.txt

      - name: Check sift_brain imports
        run: |
          python3 -c "from sift_brain.knowledge_graph.domains import DOMAINS; print(f'Domains: {list(DOMAINS.keys())}')"
          python3 -c "from sift_brain.decision_layer.router import route_query; print('Router OK')"
          python3 -c "from sift_brain.knowledge_graph.graph import KnowledgeGraph; print('Graph OK')"
